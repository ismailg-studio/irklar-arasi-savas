<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Irklar Arası Savaş</title>

<style>

body{
    margin:0;
    background:#0b0b0b;
    font-family:Arial;
    color:white;
}

/* INTRO */
#intro{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    animation:fadeOut 3s forwards;
}

#intro h1{
    color:#e50914;
    font-size:42px;
    letter-spacing:4px;
}

@keyframes fadeOut{
    0%{opacity:1;}
    80%{opacity:1;}
    100%{opacity:0;visibility:hidden;}
}

/* HEADER */
header{
    text-align:center;
    font-size:32px;
    padding:20px;
    color:#e50914;
    font-weight:bold;
}

/* SEZON */
.season{
    margin:20px;
}

.season h2{
    border-left:5px solid #e50914;
    padding-left:10px;
}

/* ROW */
.row{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px 0;
}

/* CARD */
.card{
    min-width:160px;
    background:#222;
    border-radius:10px;
    overflow:hidden;
    flex-shrink:0;
    transition:0.3s;
    cursor:pointer;
}

.card:hover{
    transform:scale(1.05);
    background:#e50914;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card p{
    text-align:center;
    font-weight:bold;
    margin:8px 0;
}

/* LINK FIX */
a{
    text-decoration:none;
    color:white;
    display:block;
}

</style>

</head>

<body>

<!-- INTRO -->
<div id="intro">
    <h1>IRKLAR ARASI SAVAŞ</h1>
</div>

<header>IRKLAR ARASI SAVAŞ</header>

<!-- SEZON 1 -->
<div class="season">
<h2>SEZON 1</h2>

<div class="row">

<a href="bolum1.html">
<div class="card">
<img src="bolum1.jpg">
<p>Bölüm 1</p>
</div>
</a>

<a href="bolum2.html">
<div class="card">
<img src="bolum2.jpg">
<p>Bölüm 2</p>
</div>
</a>

<a href="bolum3.html">
<div class="card">
<img src="bolum3.jpg">
<p>Bölüm 3</p>
</div>
</a>

</div>
</div>

</body>
</html>
