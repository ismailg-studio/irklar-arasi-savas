<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Irklar Arası Savaş</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    font-family:Arial;
    color:white;
}

/* HEADER */
header{
    text-align:center;
    font-size:32px;
    padding:20px;
    color:#e50914;
    font-weight:bold;
}

/* SEZON */
.season{
    margin:20px;
}

.season h2{
    border-left:5px solid #e50914;
    padding-left:10px;
}

/* SATIR */
.row{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px 0;
}

/* KART */
.card{
    min-width:160px;
    background:#222;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
    text-align:center;
}

.card:hover{
    transform:scale(1.05);
    background:#e50914;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card p{
    font-weight:bold;
}

/* BÖLÜM PANELİ */
#panel{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    background:#0b0b0b;
    display:none;
    padding:20px;
}

#close{
    background:#e50914;
    padding:10px 15px;
    border:none;
    color:white;
    cursor:pointer;
    margin-bottom:20px;
}
</style>
</head>

<body>

<header>IRKLAR ARASI SAVAŞ</header>

<!-- BÖLÜM PANELİ -->
<div id="panel">
    <button id="close" onclick="closePanel()">KAPAT</button>
    <h2 id="title"></h2>
    <a id="video" target="_blank" style="color:#e50914;">▶ YouTube Aç</a>
    <p id="text"></p>
</div>

<!-- SEZON 1 -->
<div class="season">
<h2>SEZON 1</h2>

<div class="row">

<div class="card" onclick="openEp(1)">
<img src="bolum1.jpg">
<p>Bölüm 1</p>
</div>

<div class="card" onclick="openEp(2)">
<img src="bolum2.jpg">
<p>Bölüm 2</p>
</div>

<div class="card" onclick="openEp(3)">
<img src="bolum3.jpg">
<p>Bölüm 3</p>
</div>

</div>
</div>

<script>

const data = {
1:{
title:"Bölüm 1",
video:"https://youtu.be/oFdAsPCF_nc",
text:"Yıldızların ötesindeki uzak bir evrende büyük kırılma başlar..."
},
2:{
title:"Bölüm 2",
video:"https://youtu.be/ym6mBdSHlhg",
text:"Baran ve Elif arasındaki gerilim artar..."
},
3:{
title:"Bölüm 3",
video:"https://youtu.be/4m2s1VbKIAs",
text:"Yeni düşmanlar sahneye çıkar..."
}
};

function openEp(id){
    document.getElementById("panel").style.display="block";
    document.getElementById("title").innerText=data[id].title;
    document.getElementById("video").href=data[id].video;
    document.getElementById("text").innerText=data[id].text;
}

function closePanel(){
    document.getElementById("panel").style.display="none";
}

</script>

</body>
</html>
