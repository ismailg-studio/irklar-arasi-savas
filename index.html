<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Irklar Arası Savaş</title>

<style>
body{
margin:0;
background:#0b0b0b;
font-family:Arial;
color:white;
}

#intro{
position:fixed;
width:100%;
height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
animation:fadeOut 3s forwards;
}

#intro h1{
color:#e50914;
font-size:42px;
letter-spacing:4px;
animation:zoom 2s ease;
}

@keyframes zoom{
0%{transform:scale(0.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

@keyframes fadeOut{
0%{opacity:1;}
80%{opacity:1;}
100%{opacity:0;visibility:hidden;}
}

header{
text-align:center;
font-size:32px;
padding:20px;
color:#e50914;
font-weight:bold;
}

.season{
margin:20px;
}

.season h2{
border-left:5px solid #e50914;
padding-left:10px;
}

.row{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px 0;
}

.card{
min-width:160px;
background:#222;
border-radius:10px;
overflow:hidden;
cursor:pointer;
text-align:center;
transition:.3s;
}

.card:hover{
transform:scale(1.05);
background:#e50914;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card p{
margin:8px 0;
font-weight:bold;
}

#panel{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#0b0b0b;
display:none;
padding:20px;
z-index:99999;
overflow:auto;
}

#panel button{
padding:10px;
background:#e50914;
border:none;
color:white;
cursor:pointer;
margin-bottom:20px;
}
</style>
</head>

<body>

<div id="intro">
<h1>IRKLAR ARASI SAVAŞ</h1>
</div>

<header>IRKLAR ARASI SAVAŞ</header>

<!-- PANEL -->
<div id="panel">
<button onclick="closePanel()">Kapat</button>
<h2 id="title"></h2>
<a id="video" target="_blank" style="color:#e50914;">▶ YouTube İzle</a>
<p id="text"></p>
</div>

<!-- SEZONLAR -->
<div id="seasons"></div>

<script>

};

const seasons = {
"SEZON 1":[1,2,3,4,5],
"SEZON 2":[6,7,8,9,10],
"SEZON 3":[11,12,13,14,15],
"SEZON 4":[16,17,18,19],
"SEZON 5":[20,21,22,23,24,25],
"SEZON 6":[26,27,28,29]
};

let html="";

for(let s in seasons){
html+=`<div class="season"><h2>${s}</h2><div class="row">`;

seasons[s].forEach(id=>{
html+=`
<div class="card" onclick="openEp(${id})">
<img src="bolum${id}.jpg">
<p>${data[id].t}</p>
</div>`;
});

html+=`</div></div>`;
}

document.getElementById("seasons").innerHTML=html;

function openEp(id){
document.getElementById("panel").style.display="block";
document.getElementById("title").innerText=data[id].t;
document.getElementById("video").href=data[id].v;
document.getElementById("text").innerText=data[id].x;
}

function closePanel(){
document.getElementById("panel").style.display="none";
}
</script>

</body>
</html>
