<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Irklar Arası Savaş</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    font-family:Arial;
    color:white;
}

/* HEADER */
header{
    text-align:center;
    font-size:32px;
    padding:20px;
    color:#e50914;
    font-weight:bold;
}

/* SEZON */
.season{
    margin:20px;
}

.season h2{
    border-left:5px solid #e50914;
    padding-left:10px;
}

/* ROW */
.row{
    display:flex;
    overflow-x:auto;
    gap:10px;
}

/* CARD */
.card{
    min-width:160px;
    background:#222;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:.3s;
}

.card:hover{
    transform:scale(1.05);
    background:#e50914;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card p{
    text-align:center;
    font-weight:bold;
}

/* MODAL */
#modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    padding:40px;
}

#box{
    background:#111;
    padding:20px;
    border-radius:10px;
}

button{
    background:#e50914;
    color:white;
    padding:10px;
    border:none;
}
</style>
</head>

<body>

<header>IRKLAR ARASI SAVAŞ</header>

<!-- SEZON 1 -->
<div class="season">
<h2>SEZON 1</h2>
<div class="row">

<div class="card" onclick="openEp(1)">
<img src="bolum1.jpg"><p>Bölüm 1</p>
</div>

<div class="card" onclick="openEp(2)">
<img src="bolum2.jpg"><p>Bölüm 2</p>
</div>

<div class="card" onclick="openEp(3)">
<img src="bolum3.jpg"><p>Bölüm 3</p>
</div>

</div>
</div>

<!-- SEZON 2 -->
<div class="season">
<h2>SEZON 2</h2>
<div class="row">

<div class="card" onclick="openEp(4)">
<img src="bolum4.jpg"><p>Bölüm 4</p>
</div>

<div class="card" onclick="openEp(5)">
<img src="bolum5.jpg"><p>Bölüm 5</p>
</div>

<div class="card" onclick="openEp(6)">
<img src="bolum6.jpg"><p>Bölüm 6</p>
</div>

</div>
</div>

<!-- MODAL -->
<div id="modal">
<div id="box">
<button onclick="closeEp()">Kapat</button>
<h2 id="title"></h2>
<p id="text"></p>
<a id="yt" target="_blank">YouTube Aç</a>
</div>
</div>

<script>
const data = {
1:{t:"Bölüm 1", y:"https://youtu.be/oFdAsPCF_nc", d:"ÖZET 1 BURAYA"},
2:{t:"Bölüm 2", y:"https://youtu.be/ym6mBdSHlhg", d:"ÖZET 2 BURAYA"},
3:{t:"Bölüm 3", y:"https://youtu.be/4m2s1VbKIAs", d:"ÖZET 3 BURAYA"},
4:{t:"Bölüm 4", y:"https://youtu.be/vOM12uOKEuE", d:"ÖZET 4 BURAYA"},
5:{t:"Bölüm 5", y:"https://youtu.be/gIHNoDcTHaM", d:"ÖZET 5 BURAYA"},
6:{t:"Bölüm 6", y:"https://youtu.be/M-ZyOE40OA4", d:"ÖZET 6 BURAYA"}
};

function openEp(id){
    document.getElementById("modal").style.display="block";
    document.getElementById("title").innerText=data[id].t;
    document.getElementById("text").innerText=data[id].d;
    document.getElementById("yt").href=data[id].y;
}

function closeEp(){
    document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
