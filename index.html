<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Irklar Arası Savaş</title>

<style>

/* ===== GENEL ===== */
body{
    margin:0;
    background:#0b0b0b;
    font-family:Arial;
    color:white;
}

/* ===== INTRO ===== */
#intro{
    position:fixed;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    animation:fadeOut 3s forwards;
}

#intro h1{
    color:#e50914;
    font-size:42px;
    letter-spacing:4px;
    animation:zoom 2s ease;
}

@keyframes zoom{
    0%{transform:scale(0.5);opacity:0;}
    100%{transform:scale(1);opacity:1;}
}

@keyframes fadeOut{
    0%{opacity:1;}
    80%{opacity:1;}
    100%{opacity:0;visibility:hidden;}
}

/* ===== HEADER ===== */
header{
    text-align:center;
    font-size:32px;
    padding:20px;
    color:#e50914;
    font-weight:bold;
    letter-spacing:2px;
}

/* ===== SEZON ===== */
.season{
    margin:20px;
}

.season h2{
    border-left:5px solid #e50914;
    padding-left:10px;
}

/* ===== ROW ===== */
.row{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px 0;
}

/* ===== CARD ===== */
.card{
    min-width:160px;
    background:#222;
    border-radius:10px;
    overflow:hidden;
    flex-shrink:0;
    transition:0.3s;
    text-align:center;
    cursor:pointer;
}

.card:hover{
    transform:scale(1.05);
    background:#e50914;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card p{
    margin:8px 0;
    font-weight:bold;
}

</style>
</head>

<body>

<div id="intro">

</div>
