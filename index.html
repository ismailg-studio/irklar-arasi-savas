<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Irklar Arası Savaş</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    font-family:Arial;
    color:white;
}

/* HEADER */
header{
    text-align:center;
    padding:20px;
    font-size:30px;
    color:#e50914;
}

/* SEZON */
.season{
    margin:20px;
}

.season h2{
    border-left:5px solid #e50914;
    padding-left:10px;
}

/* CARD */
.row{
    display:flex;
    overflow-x:auto;
    gap:10px;
}

.card{
    min-width:160px;
    background:#222;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    background:#e50914;
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

/* POPUP */
.popup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    padding:20px;
    overflow:auto;
}

.popup img{
    width:100%;
    max-width:500px;
}

.close{
    color:white;
    font-size:25px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>IRKLAR ARASI SAVAŞ</header>

<!-- SEZON 1 -->
<div class="season">
<h2>SEZON 1</h2>
<div class="row">

<div class="card" onclick="openEp(1)">
<img src="bolum1.jpg">
<p>Bölüm 1</p>
</div>

<div class="card" onclick="openEp(2)">
<img src="bolum2.jpg">
<p>Bölüm 2</p>
</div>

<div class="card" onclick="openEp(3)">
<img src="bolum3.jpg">
<p>Bölüm 3</p>
</div>

</div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="close" onclick="closeEp()">KAPAT ✖</div>

<h2 id="title"></h2>
<img id="img">
<p id="text"></p>
<a id="video" target="_blank" style="color:#e50914;">YouTube Aç</a>
</div>

<script>

const data = {
1:{
title:"Bölüm 1",
img:"bolum1.jpg",
text:"Yıldızların ötesinde büyük kırılma başlar...",
video:"https://youtu.be/oFdAsPCF_nc"
},
2:{
title:"Bölüm 2",
img:"bolum2.jpg",
text:"Baran ve Elif arasındaki gerilim artar...",
video:"https://youtu.be/ym6mBdSHlhg"
},
3:{
title:"Bölüm 3",
img:"bolum3.jpg",
text:"Yeni düşmanlar ortaya çıkar...",
video:"https://youtu.be/4m2s1VbKIAs"
}
};

function openEp(id){
document.getElementById("popup").style.display="block";
document.getElementById("title").innerText=data[id].title;
document.getElementById("img").src=data[id].img;
document.getElementById("text").innerText=data[id].text;
document.getElementById("video").href=data[id].video;
}

function closeEp(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
